<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">

</head>

<body>

    <div class="container">
        <div class="section-one">
            <h1 class="section-one__title">Vignesh Kumar</h1>
            <p class="section-one__subtitle">Web Developer</p>
            <a class="section-one__contact" href="index.html">Home</a>
        </div>

        <form class="table-form">
            <table>
                <tr>
                    <td>Name:</td>
                    <td><input type="text" placeholder="Enter Your Name" class="table-form__input"></td>
                </tr>

                <tr>
                    <td>Email:</td>
                    <td><input type="text" placeholder="Enter Your Email" class="table-form__email"></td>
                </tr>

                <tr>
                    <td>Message:</td>
                    <td><textarea name="message" id="message" placeholder="Enter Your Message"
                            class="table-form__textarea"></textarea></td>
                </tr>

                <tr>
                    <td></td>
                    <td><input type="submit" class="table-form__submit"></td>
                </tr>
            </table>
        </form>


        <div class="section-five">
            <p class="section-five__title">Social Media: <a href="https://www.instagram.com/">Instagram</a>,<a
                    href="https://in.linkedin.com/">LinkedIn</a></p>
            <p class="section-five__desc">&copy; Vignesh Kumar</p>

        </div>

    </div>
</body>

</html>
